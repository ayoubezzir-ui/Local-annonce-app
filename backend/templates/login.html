{% extends 'base/base.html' %}

{% block title %}Connexion — AnnonceApp{% endblock %}

{% block content %}
<div class="d-flex justify-content-center" style="justify-content: center; align-items: center; min-height: 70vh;">
    <div class="card" style="max-width: 450px; width: 100%; padding: 2.5rem;">
        <div class="text-center mb-3">
            <h2 style="color: var(--text-highlight); margin-bottom: 0.5rem;">Bienvenue</h2>
            <p style="color: #888;">Connectez-vous pour accéder à votre espace</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next|default:'/annonces/' }}">
            
            <div class="form-group">
                <label class="form-label">Nom d'utilisateur</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            
            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            
            {% if form.errors %}
            <div style="background: rgba(255,76,76,0.1); border-left: 3px solid var(--danger); padding: 0.8rem; margin-bottom: 1.5rem; border-radius: 4px;">
                <span style="color: var(--danger); font-size: 0.9rem;">Identifiants incorrects. Veuillez réessayer.</span>
            </div>
            {% endif %}
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Se connecter</button>
        </form>
    </div>
</div>
{% endblock %}
