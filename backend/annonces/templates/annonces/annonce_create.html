<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Nouvelle Annonce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
        }

        .navbar {
            background-color: #1e1e2e !important;
            border-bottom: 1px solid #2e2e3e;
        }

        .navbar-brand {
            font-weight: 700;
            color: #818cf8 !important;
        }

        .form-card {
            background-color: #1e1e2e;
            border: 1px solid #2e2e3e;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            margin: 60px auto;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e0e0e0;
            margin-bottom: 30px;
        }

        .form-label {
            font-weight: 600;
            color: #a0a0b0;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 10px 14px;
            background-color: #2e2e3e;
            border: 1px solid #3e3e4e;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #e0e0e0;
            margin-top: 5px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .btn-publier {
            background-color: #818cf8;
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-publier:hover {
            background-color: #6366f1;
        }

        .btn-annuler {
            background-color: #2e2e4e;
            color: #818cf8;
            border: none;
            padding: 10px 28px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 10px;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-annuler:hover {
            background-color: #3e3e5e;
            color: #a5b4fc;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark px-4">
        <span class="navbar-brand">📢 AnnonceApp</span>
    </nav>
    <div class="form-card">
        <h1>📢 Nouvelle Annonce</h1>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Titre</label>
                {{ form.titre }}
            </div>
            <div class="mb-3">
                <label class="form-label">Contenu</label>
                {{ form.contenu }}
            </div>
            <div class="mb-3">
                <label class="form-label">Département</label>
                {{ form.departement }}
            </div>
            <div class="mt-4">
                <button type="submit" class="btn-publier">Publier</button>
                <a href="/annonces/" class="btn-annuler">Annuler</a>
            </div>
        </form>
    </div>
</body>

</html>
