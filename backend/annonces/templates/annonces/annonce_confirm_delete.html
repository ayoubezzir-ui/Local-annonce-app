{% extends 'base/base.html' %}

{% block title %}Supprimer l'annonce — AnnonceApp{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 4rem auto; padding: 2rem; text-align: center; border-color: var(--danger);">
    <h2 style="color: var(--danger); margin-bottom: 1.5rem;">⚠️ Confirmation requise</h2>
    
    <p style="margin-bottom: 2rem; font-size: 1.1rem;">
        Êtes-vous sûr de vouloir supprimer l'annonce :<br>
        <strong style="color: var(--text-highlight);">"{{ object.titre }}"</strong> ?
    </p>
    
    <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2" style="justify-content: center;">
            <button type="submit" class="btn btn-danger">Oui, supprimer définitivement</button>
            <a href="{% url 'annonce_detail' object.pk %}" class="btn btn-outline">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
